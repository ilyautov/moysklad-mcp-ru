name: supply-chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  osv:
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --recursive
        ./

  python-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: pip-audit (runtime dependencies)
        run: |
          python -m pip install --upgrade pip pip-audit
          # Audit the declared runtime deps only (this package itself is not on
          # PyPI, so we don't install it — we derive its dependency list).
          python -c "import tomllib,pathlib;print(chr(10).join(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['dependencies']))" > requirements-audit.txt
          cat requirements-audit.txt
          pip-audit --strict -r requirements-audit.txt

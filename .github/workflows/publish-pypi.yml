name: Publish to PyPI

# On every v* tag: build sdist+wheel and publish to PyPI via Trusted
# Publishing (OIDC — no API token stored in the repo).
#
# PyPI-side setup (one-time, done in the PyPI web UI before the first tag):
#   Account → Publishing → Add a pending publisher
#     PyPI Project Name: moysklad-mcp-ru
#     Owner:             ilyautov
#     Repository name:   moysklad-mcp-ru
#     Workflow name:     publish-pypi.yml   <-- must match this file's name exactly
#     Environment name:  pypi
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  pypi:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/moysklad-mcp-ru
    permissions:
      id-token: write # mandatory for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

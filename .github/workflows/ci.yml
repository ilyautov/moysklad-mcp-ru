name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime + test deps
        run: pip install "mcp>=1.2.0" "httpx>=0.27" "pyyaml>=6.0" "pytest>=8.0" "pytest-asyncio>=0.23"
      - name: Selfcheck (no network, no token)
        run: python3 serve.py ms --selfcheck
      - name: "Tests (offline — incl. safety-catalog: 0 mutations marked read)"
        run: python3 -m pytest tests/ -q

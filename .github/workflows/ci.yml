name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install runtime + test deps
        run: pip install "mcp>=1.2.0" "httpx>=0.27" "pyyaml>=6.0" "pytest>=8.0" "pytest-asyncio>=0.23"
      - name: Selfcheck (no network, no token)
        run: python3 serve.py ms --selfcheck
      - name: "Tests (offline — incl. safety-catalog: 0 mutations marked read)"
        run: python3 -m pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run pre-commit
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files
